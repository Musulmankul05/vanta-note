{% load static tailwind_tags %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>vanta |signup</title>
    {% tailwind_css %}
</head>
<body class="bg-black text-zinc-400 font-mono antialiased h-screen flex items-center justify-center overflow-hidden">

<!-- Легкое свечение на фоне (опционально) -->
<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-red-950/20 via-black to-black -z-10"></div>

<!-- Login Container -->
<div class="w-full max-w-md bg-[#0a0a0a] border border-zinc-900 shadow-2xl relative p-8">

    <!-- Верхняя красная линия-акцент -->
    <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-red-800 to-transparent"></div>

    <!-- Header -->
    <div class="text-center mb-10 mt-2">
        <h1 class="text-2xl font-bold text-white tracking-[0.2em] uppercase flex items-center justify-center gap-3">
            <span class="w-2 h-2 bg-red-700 rounded-full animate-pulse shadow-[0_0_12px_rgba(185,28,28,0.8)]"></span>
            System Auth
        </h1>
        <p class="text-[10px] text-zinc-600 mt-2 uppercase tracking-[0.3em]">Restricted Access</p>
    </div>

    {% if error %}
    <div class="mb-6 p-3 border border-red-900/50 bg-red-950/20 text-red-500 text-[10px] tracking-widest uppercase text-center animate-pulse">
        {{ error }}
    </div>
    {% endif %}
    <!-- Form -->
    <form method="post" class="space-y-6">
        {% csrf_token %}

        <!-- Username Input -->
        <div class="space-y-2">
            <label class="block text-[10px] uppercase tracking-widest text-zinc-500">Identifier</label>
            <input id="username" name="username" type="text" placeholder="Create username"
                   class="w-full bg-[#050505] text-zinc-200 text-sm placeholder-zinc-800 border border-zinc-800/80 p-3 focus:outline-none focus:border-red-800 focus:ring-1 focus:ring-red-900/30 transition-all rounded-none">
        </div>
        <div class="space-y-2">
            <label for="email" class="block text-[10px] uppercase tracking-widest text-zinc-500">Mail</label>
            <input id="email" name="email" type="email" placeholder="Enter email"
                   class="w-full bg-[#050505] text-zinc-200 text-sm placeholder-zinc-800 border border-zinc-800/80 p-3 focus:outline-none focus:border-red-800 focus:ring-1 focus:ring-red-900/30 transition-all rounded-none">
        </div>
        <div class="space-y-2">
            <div class="flex justify-between items-center">
                <label class="block text-[10px] uppercase tracking-widest text-zinc-500">Security Key</label>
            </div>
            <div class="relative">
            <input id="password1" name="password1" type="password" placeholder="Create password"
                   class="w-full bg-[#050505] text-zinc-200 text-sm placeholder-zinc-800 border border-zinc-800/80 p-3
                    focus:outline-none focus:border-red-800 focus:ring-1 focus:ring-red-900/30 transition-all rounded-none
                    font-sans tracking-widest">
            <button type="button" id="togglePassword" class="absolute right-4 top-3.5 text-zinc-800 hover:text-zinc-700 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
            </button>

            </div>
        </div>
        <div class="space-y-2">
            <div class="flex justify-between items-center">
                <label class="block text-[10px] uppercase tracking-widest text-zinc-500">Security Key Confirm</label>
            </div>
            <input id="password2" name="password2" type="password" placeholder="Repeat password"
                   class="w-full bg-[#050505] text-zinc-200 text-sm placeholder-zinc-800 border border-zinc-800/80 p-3
                    focus:outline-none focus:border-red-800 focus:ring-1 focus:ring-red-900/30 transition-all rounded-none
                    font-sans tracking-widest">
        </div>

        <!-- Action Button -->
        <button type="submit"
                class="w-full mt-4 bg-transparent border border-red-900/50 text-red-600 hover:text-white hover:bg-red-900/40 hover:border-red-700 p-3 text-xs uppercase tracking-[0.2em] font-bold transition-all group">
            Create Connection
        </button>

    </form>

    <div class="mt-8 border-t border-zinc-900/80 pt-5 text-center">
        <p class="text-[9px] text-zinc-700 uppercase tracking-widest flex items-center justify-center gap-2">
            <svg class="w-3 h-3 text-zinc-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
            End-to-end encrypted protocol
        </p>
    </div>

</div>
</body>
<script>
    document.addEventListener('DOMContentLoaded', () => {
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password1');

            togglePassword.addEventListener('click', () => {
                // Меняем 'password' на 'text' и обратно
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                togglePassword.classList.toggle('text-zinc-700');
                togglePassword.classList.toggle('text-white'); // Добавил подсветку при нажатии
            });
        });
</script>
</html>
