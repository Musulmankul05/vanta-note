{% load static tailwind_tags %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Websidian</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    {% tailwind_css %}
</head>
<body class="bg-black text-zinc-400 font-mono antialiased h-screen flex overflow-hidden">

    <!-- Sidebar / Notes Menu -->
    <aside class="w-72 bg-[#17171b] border-r border-zinc-900 flex flex-col h-full shadow-2xl">

        <!-- Header -->
        <div class="p-6 pb-4">
            <h1 class="text-lg font-bold text-white tracking-widest uppercase flex items-center gap-3">
                <span class="w-2 h-2 bg-red-700 rounded-full animate-pulse shadow-[0_0_10px_rgba(185,28,28,0.5)]"></span>
                Vault
            </h1>
        </div>

        <!-- Search -->
        <div class="px-4 py-2">
            <input type="text" placeholder="Search..."
                class="w-full bg-zinc-900/40 text-zinc-200 text-xs placeholder-zinc-700 rounded-none py-2.5 px-3
                focus:outline-none focus:ring-1 focus:ring-red-900/50 border border-zinc-800/50 transition-colors">
        </div>

        <!-- Notes List -->
        <div class="flex-1 overflow-y-auto px-3 space-y-1 mt-4 scrollbar-hide">

            <!-- Active Note -->
            {% for note in notes %}
            	<!-- Пример одной кнопки -->
                <button
                    id="note-{{ note.id }}"
                    hx-get="{% url 'note-detail' note.pk %}"
                    hx-target="#note-content-area"
                    hx-on:click="
                        /* 1. Убираем активные стили у всех кнопок */
                        document.querySelectorAll('.note-btn').forEach(el => {
                            el.classList.remove('bg-zinc-900/80', 'border-red-700', 'text-white');
                            el.classList.add('border-transparent', 'text-zinc-400');
                        });
                        /* 2. Добавляем активные стили этой кнопке */
                        this.classList.add('bg-zinc-900/80', 'border-red-700', 'text-white');
                        this.classList.remove('border-transparent', 'text-zinc-400');
                    "
                    class="note-btn w-full text-left p-3 border-l-2 border-transparent text-zinc-400 transition-all group">

                    <div class="text-sm font-semibold truncate">{{ note.title }}</div>
                    <div class="text-xs text-zinc-600 truncate group-hover:text-zinc-500">{{ note.created_at }}</div>
                </button>
            {% endfor %}

        </div>

        <!-- Footer -->
        <div class="p-5 border-t border-zinc-900/50 mt-auto flex items-center justify-between">
            <div class="text-[10px] text-zinc-600 uppercase tracking-widest font-semibold">User: {{ user.username }}</div>
            <div class="text-[10px] text-zinc-600 uppercase tracking-widest">v1.0</div>
        </div>

    </aside>

    <!-- Main Content Area -->
    <main id="note-content-area" class="overflow-auto flex-1 bg-[#101013] p-10 flex">
        <p class="text-zinc-800 text-xs tracking-[0.2em] ml-[45%] my-[25%] uppercase">Select a note</p>
    </main>

</body>
</html>
